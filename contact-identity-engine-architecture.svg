<svg width="100%" viewBox="0 0 680 510" role="img" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="black" />
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Contact Identity Engine Component Diagram</title>
  
  <desc style="fill:none;color:rgb(255, 255, 255);font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;">Architecture diagram of the Contact Identity Engine</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="rgba(222, 220, 209, 0.4)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <style>
    .font-sans {
      font-family: "Anthropic Sans", -apple-system, "system-ui", "Segoe UI", sans-serif;
    }
  </style>

  <!-- Actors -->
  <g>
    <rect x="280" y="20" width="120" height="40" rx="8" stroke-width="0.5" style="fill:rgb(68, 68, 65);stroke:rgb(180, 178, 169);" />
    <text x="340" y="40" text-anchor="middle" dominant-baseline="central" style="fill:white;font-size:14px;font-weight:500;" class="font-sans">Client App</text>
  </g>

  <!-- Node.js Service Boundary -->
  <rect x="22" y="90" width="636" height="260" rx="12" fill="none" stroke="rgba(222, 220, 209, 0.3)" stroke-width="1" stroke-dasharray="6 4" />
  <text x="38" y="110" style="fill:white;font-size:12px;font-weight:400;" class="font-sans">Node.js Express API</text>

  <!-- Express Router -->
  <g>
    <rect x="240" y="120" width="200" height="52" rx="8" stroke-width="0.5" style="fill:rgb(60, 52, 137);stroke:rgb(175, 169, 236);" />
    <text x="340" y="138" text-anchor="middle" dominant-baseline="central" style="fill:white;font-size:14px;font-weight:500;" class="font-sans">Express Router &amp; Controller</text>
    <text x="340" y="156" text-anchor="middle" dominant-baseline="central" style="fill:white;font-size:12px;font-weight:400;" class="font-sans">HTTP /identify endpoint</text>
  </g>

  <!-- Resolution Service -->
  <g>
    <rect x="240" y="250" width="200" height="52" rx="8" stroke-width="0.5" style="fill:rgb(8, 80, 65);stroke:rgb(93, 202, 165);" />
    <text x="340" y="268" text-anchor="middle" dominant-baseline="central" style="fill:white;font-size:14px;font-weight:500;" class="font-sans">Resolution Service</text>
    <text x="340" y="286" text-anchor="middle" dominant-baseline="central" style="fill:white;font-size:12px;font-weight:400;" class="font-sans">Identity overlap logic</text>
  </g>

  <!-- Cloud Infra Boundary -->
  <rect x="22" y="380" width="636" height="110" rx="12" fill="none" stroke="rgba(222, 220, 209, 0.3)" stroke-width="1" stroke-dasharray="6 4" />
  <text x="38" y="400" style="fill:white;font-size:12px;font-weight:400;" class="font-sans">Neon Cloud</text>

  <!-- Neon Postgres DB -->
  <g>
    <rect x="240" y="418" width="200" height="52" rx="8" stroke-width="0.5" style="fill:rgb(99, 56, 6);stroke:rgb(239, 159, 39);" />
    <text x="340" y="436" text-anchor="middle" dominant-baseline="central" style="fill:white;font-size:14px;font-weight:500;" class="font-sans">PostgreSQL Database</text>
    <text x="340" y="454" text-anchor="middle" dominant-baseline="central" style="fill:white;font-size:12px;font-weight:400;" class="font-sans">contacts table</text>
  </g>

  <!-- Arrows -->
  
  <!-- Client to Router -->
  <line x1="340" y1="60" x2="340" y2="120" stroke="rgba(222, 220, 209, 0.4)" stroke-width="1" fill="none" marker-end="url(#arrow)" />
  <rect x="280" y="75" width="120" height="20" fill="black" />
  <text x="340" y="85" text-anchor="middle" dominant-baseline="central" style="fill:white;font-size:12px;font-weight:400;" class="font-sans">POST /identify</text>

  <!-- Router to Service -->
  <line x1="340" y1="172" x2="340" y2="250" stroke="rgba(222, 220, 209, 0.4)" stroke-width="1" fill="none" marker-end="url(#arrow)" />
  <rect x="280" y="195" width="120" height="20" fill="black" />
  <text x="340" y="205" text-anchor="middle" dominant-baseline="central" style="fill:white;font-size:12px;font-weight:400;" class="font-sans">email / phoneNumber</text>

  <!-- Service to Service (Self arrow for merging) -->
  <path d="M 440 276 C 480 276 480 250 410 250" stroke="rgba(222, 220, 209, 0.4)" stroke-width="1" fill="none" marker-end="url(#arrow)" />
  <rect x="470" y="260" width="100" height="20" fill="black" />
  <text x="520" y="270" text-anchor="middle" dominant-baseline="central" style="fill:white;font-size:12px;font-weight:400;" class="font-sans">resolve links</text>

  <!-- Service to DB -->
  <line x1="320" y1="302" x2="320" y2="418" stroke="rgba(222, 220, 209, 0.4)" stroke-width="1" fill="none" marker-end="url(#arrow)" />
  <rect x="260" y="350" width="50" height="20" fill="black" />
  <text x="285" y="360" text-anchor="middle" dominant-baseline="central" style="fill:white;font-size:12px;font-weight:400;" class="font-sans">SELECT</text>
  <rect x="260" y="375" width="50" height="20" fill="black" />
  <text x="285" y="385" text-anchor="middle" dominant-baseline="central" style="fill:white;font-size:12px;font-weight:400;" class="font-sans">INSERT</text>

  <!-- DB to Service -->
  <line x1="360" y1="418" x2="360" y2="302" stroke="rgba(222, 220, 209, 0.4)" stroke-width="1" fill="none" marker-end="url(#arrow)" />
  <rect x="370" y="360" width="100" height="20" fill="black" />
  <text x="420" y="370" text-anchor="middle" dominant-baseline="central" style="fill:white;font-size:12px;font-weight:400;" class="font-sans">Linked Contacts</text>

  <!-- Returns format -->
  <path d="M 240 276 L 160 276 L 160 146 L 240 146" stroke="rgba(222, 220, 209, 0.4)" stroke-width="1" fill="none" marker-end="url(#arrow)" />
  <rect x="110" y="195" width="100" height="36" fill="black" />
  <text x="160" y="205" text-anchor="middle" dominant-baseline="central" style="fill:white;font-size:12px;font-weight:400;" class="font-sans">normalized</text>
  <text x="160" y="221" text-anchor="middle" dominant-baseline="central" style="fill:white;font-size:12px;font-weight:400;" class="font-sans">identity tree</text>

  <!-- Router to Client return -->
  <path d="M 240 136 L 100 136 L 100 40 L 280 40" stroke="rgba(222, 220, 209, 0.4)" stroke-width="1" fill="none" marker-end="url(#arrow)" />
  <rect x="50" y="75" width="100" height="20" fill="black" />
  <text x="100" y="85" text-anchor="middle" dominant-baseline="central" style="fill:white;font-size:12px;font-weight:400;" class="font-sans">Response JSON</text>

</svg>
